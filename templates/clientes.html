<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes | Autono+</title>
</head>
<body>

{% extends "base.html" %}
{% block title %}Clientes | Autono+{% endblock %}

{% block content %}
<div class="container">
    <h2>Clientes</h2>

    <section class="form-section">
        <form method="post" class="card">
            <input name="nome" placeholder="Nome do cliente" required>
            <input name="telefone" placeholder="Telefone">
            <input name="observacao" placeholder="Observação">
            <button type="submit" class="btn-primary">Adicionar cliente</button>
        </form>
    </section>

    <hr>

    <div class="table-wrapper">    
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>Observação</th>
                    <th colspan="2">Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for c in clientes %}
                <tr>
                    <td>{{ c[1] }}</td>
                    <td>{{ c[2] }}</td>
                    <td>{{ c[3] }}</td>
                    <td>
                        <a class="btn btn-edit" href="{{ url_for('clientes.editar_cliente', id=c[0]) }}">
                            Editar
                        </a>
                    </td>
                    <td>
                        <a class="btn btn-delete" href="{{ url_for('clientes.excluir_cliente', id=c[0]) }}"
                           onclick="return confirm('Excluir este cliente? Isso apagará todos os serviços dele.')">
                            Excluir
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="actions">
        <br>
        <a href="{{ url_for('dashboard.dashboard') }}" class="btn-back">← Voltar ao Dashboard</a>
    </div>
</div>
{% endblock %}


    <br>
    <a href="/dashboard">Voltar</a>
</body>
</html>
