{% extends "base.html" %}
{% block title %}Editar Serviço | Autono+{% endblock %}

{% block content %}
<h2>Editar Serviço</h2>

<form method="post">
    <select name="cliente_id">
        {% for c in clientes %}
        <option value="{{ c.id }}"
            {% if c.id == servico.cliente_id %}selected{% endif %}>
            {{ c.nome }}
        </option>
        {% endfor %}
    </select>

    <input name="descricao" value="{{ servico.descricao }}" required>
    <input name="valor" type="number" step="0.01" value="{{ servico.valor }}">
    <input name="data" type="date" value="{{ servico.data }}">

    <select name="status">
        <option value="pendente" {% if servico.status == 'pendente' %}selected{% endif %}>
            Pendente
        </option>
        <option value="pago" {% if servico.status == 'pago' %}selected{% endif %}>
            Pago
        </option>
    </select>

    <button>Salvar alterações</button>
</form>
{% endblock %}
